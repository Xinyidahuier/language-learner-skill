<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ed321"/>
      <stop offset="100%" stop-color="#58cc02"/>
    </linearGradient>
    <radialGradient id="shine" cx="32%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fa900"/>
      <stop offset="100%" stop-color="#2d7a00"/>
    </linearGradient>
    <clipPath id="tileClip">
      <rect x="0" y="0" width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Tile background (green, site theme) -->
  <g clip-path="url(#tileClip)">
    <rect x="0" y="0" width="100" height="100" fill="url(#bg)"/>
    <rect x="0" y="0" width="100" height="100" fill="url(#shine)"/>
  </g>

  <!-- Chat bubble (centered horizontally in tile) -->
  <path d="
    M 18 30
    Q 18 22 26 22
    L 74 22
    Q 82 22 82 30
    L 82 60
    Q 82 68 74 68
    L 38 68
    L 26 78
    Q 24 79.5 24.5 76
    L 26 68
    Q 18 68 18 60 Z
  " fill="white"/>

  <!-- Chinese character 中 inside bubble -->
  <text x="50" y="58"
        text-anchor="middle"
        font-family="'Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif"
        font-size="38"
        font-weight="900"
        fill="url(#letter)">中</text>

  <!-- Small Chinese flag badge (bottom-right corner accent) -->
  <g transform="translate(74,82)">
    <rect x="0" y="0" width="20" height="14" rx="2" fill="#de2910" stroke="#fff" stroke-width="1"/>
    <g fill="#ffde00" transform="translate(5,5)">
      <polygon points="0,-2.8 0.66,-0.91 2.66,-0.87 1.05,0.35 1.64,2.27 0,1.12 -1.64,2.27 -1.05,0.35 -2.66,-0.87 -0.66,-0.91"/>
      <polygon transform="translate(4,-1.8) scale(0.45)" points="0,-2.8 0.66,-0.91 2.66,-0.87 1.05,0.35 1.64,2.27 0,1.12 -1.64,2.27 -1.05,0.35 -2.66,-0.87 -0.66,-0.91"/>
      <polygon transform="translate(5.5,0.5) scale(0.45)" points="0,-2.8 0.66,-0.91 2.66,-0.87 1.05,0.35 1.64,2.27 0,1.12 -1.64,2.27 -1.05,0.35 -2.66,-0.87 -0.66,-0.91"/>
      <polygon transform="translate(5,3) scale(0.45)" points="0,-2.8 0.66,-0.91 2.66,-0.87 1.05,0.35 1.64,2.27 0,1.12 -1.64,2.27 -1.05,0.35 -2.66,-0.87 -0.66,-0.91"/>
      <polygon transform="translate(3,4.2) scale(0.45)" points="0,-2.8 0.66,-0.91 2.66,-0.87 1.05,0.35 1.64,2.27 0,1.12 -1.64,2.27 -1.05,0.35 -2.66,-0.87 -0.66,-0.91"/>
    </g>
  </g>
</svg>
